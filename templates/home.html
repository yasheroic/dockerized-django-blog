{% extends "base.html" %}

{% block content %}
<h2>All Posts</h2>

{% for post in posts %}
    <div class="post">
        <h3>{{ post.title }}</h3>
        <p>{{ post.content }}</p>
        <small>{{ post.created_at }}</small>
    </div>
{% empty %}
    <p>No posts yet.</p>
{% endfor %}

{% endblock %}
